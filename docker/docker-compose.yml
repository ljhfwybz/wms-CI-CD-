version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wms_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ljh
      MYSQL_DATABASE: db_warehouse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../db_script:/docker-entrypoint-initdb.d
    networks:
      - wms_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pljh"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend/warehouse_manager
      dockerfile: ../../docker/backend/Dockerfile
    container_name: wms_backend
    ports:
      - "9999:9999"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_warehouse?serverTimezone=UTC&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ljh
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    networks:
      - wms_network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend/warehouse_boot_pc
      dockerfile: ../../docker/frontend/Dockerfile
    container_name: wms_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - wms_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  wms_network:
    driver: bridge
