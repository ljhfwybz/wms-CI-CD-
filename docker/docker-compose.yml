version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wms_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ljh
      MYSQL_DATABASE: db_warehouse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../db_script:/docker-entrypoint-initdb.d
    networks:
      - wms_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pljh"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-blue:
    build:
      context: ../backend/warehouse_manager
      dockerfile: ../../docker/backend/Dockerfile
    volumes:
      # 后端图片上传目录：两套蓝绿共享同一份上传数据
      - wms_upload:/app/static/img/upload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://wms_mysql:3306/db_warehouse?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ljh
      SPRING_REDIS_HOST: wms_redis
      SPRING_REDIS_PORT: 6379
    networks:
      - wms_network
    restart: unless-stopped

  backend-green:
    build:
      context: ../backend/warehouse_manager
      dockerfile: ../../docker/backend/Dockerfile
    volumes:
      - wms_upload:/app/static/img/upload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://wms_mysql:3306/db_warehouse?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ljh
      SPRING_REDIS_HOST: wms_redis
      SPRING_REDIS_PORT: 6379
    networks:
      - wms_network
    restart: unless-stopped

  # 负责对外提供 80 端口，并按 /api/ 或 /warehouse/ 反代到 blue/green 后端
  nginx-lb:
    image: nginx:alpine
    container_name: wms_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-lb.conf:/etc/nginx/nginx.conf:ro
      # 前端静态文件（由 frontend-assets 服务拷贝）
      - frontend_html:/usr/share/nginx/html:ro
    depends_on:
      - frontend-assets
    networks:
      - wms_network
    restart: unless-stopped

  # 构建前端 dist 并拷贝到共享卷，供 nginx-lb 直接提供静态资源
  frontend-assets:
    build:
      context: ../frontend/warehouse_boot_pc
      dockerfile: ../../docker/frontend/Dockerfile
      args:
        VITE_WAREHOUSE_CONTEXT_PATH: /warehouse
    volumes:
      - frontend_html:/assets
    depends_on:
      - backend-blue
    networks:
      - wms_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  wms_upload:
  frontend_html:

networks:
  wms_network:
    driver: bridge
